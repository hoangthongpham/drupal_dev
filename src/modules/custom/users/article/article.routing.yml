# Frontend
blogs:
  path: "/blogs"
  defaults:
    _controller: '\Drupal\article\Controller\BlogController::index'
    _title: "Blogs"
  requirements:
    _permission: "access content"

article.home_data:
  path: "/home-data"
  defaults:
    _controller: '\Drupal\article\Controller\FrontEndController::homeData'
  requirements:
    _permission: "access content"

article.loadArticle:
  path: "/list-article"
  defaults:
    _controller: '\Drupal\article\Controller\FrontEndController::loadArticle'
    _title: "List articles"
  requirements:
    _permission: "access content"

article.list_article:
  path: "/list-art"
  defaults:
    _controller: '\Drupal\article\Controller\FrontEndController::listArticles'
  requirements:
    _permission: "access content"

article.detailArticle:
  path: "/detail/{id}"
  defaults:
    _controller: '\Drupal\article\Controller\FrontEndController::detailArticle'
  requirements:
    _permission: "access content"
article.tagArticle:
  path: "/tag-article/{tag}"
  defaults:
    _controller: '\Drupal\article\Controller\FrontEndController::articleByTag'
  requirements:
    _permission: "access content"

article.search:
  path: "/search"
  defaults:
    _controller: '\Drupal\article\Controller\FrontEndController::searchPage'
    _title: "Search"
  requirements:
    _permission: "access content"

article.contact:
  path: "/contact-form"
  defaults:
    _controller: '\Drupal\article\Controller\FrontEndController::contactForm'
    _title: "Contact"
  requirements:
    _permission: "access content"

article.submitForm:
  path: "/contact-sub-form"
  defaults:
    _controller: '\Drupal\article\Controller\FrontEndController::submitContactForm'
    _title: "Contact"
  requirements:
    _permission: "access content"

